<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>
Roteiro Prático do Sistema Esquelético
</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<body>

<header>

Roteiro Prático do Sistema Esquelético  
Prof. Dra. Cláudia Pinheiro

</header>

<div class="toolbar">

<input id="busca" placeholder="Buscar">

<button onclick="modo()">Modo</button>

<button onclick="gerarPDF()">Gerar PDF</button>

</div>

<div id="tabs"></div>

<div id="conteudo"></div>

<script>

const roteiro = {

Extremidade acromial
Tubérculo conoide

Úmero:

Tubérculo maior
Tubérculo menor
Sulco intertubercular
Corpo do úmero
Tróclea
Capítulo
Fossa coronóide
Fossa do olecrano
Sulco do nervo radial

Rádio:
Cabeça do rádio
Corpo do rádio
Tuberosidade do rádio
Processo estilóide do rádio

Ulna:
Olécrano
Processo coronóide
Incisura radial
Incisura troclear
Corpo da ulna
Cabeça da ulna
Tuberosidade da ulna

Ossos Carpais:
Escafóide
Semilunar
Piramidal
Pisiforme
Trapézio
Trapezóide
Capitato
Hamato

Ossos metacarpais (I ao V)

Falanges (proximal, média e distal)

`,

"Membro Inferior":`

Osso do Quadril:
Acetábulo
Fossa do acetábulo

Ílio:
Crista ilíaca
Espinha ilíaca antero-superior
Espinha ilíaca antero-inferior
Espinha ilíaca postero-superior
Espinha ilíaca postero-inferior
Face auricular

Ísquio:
Túber isquiático
Espinha isquiática
Ramo do ísquio

Incisura isquiática maior
Incisura isquiática menor

Púbis:
Corpo do púbis
Face sinfisial
Ramo superior do púbis
Ramo inferior do púbis

Fêmur:
Cabeça do fêmur
Colo do fêmur
Trocânter maior
Trocânter menor
Corpo do fêmur
Côndilo medial
Côndilo lateral
Face patelar
Fóvea da cabeça do fêmur
Linha intertrocantérica
Crista intertrocantérica

Patela:
Face articular
Ápice
Base

Tíbia:
Côndilo lateral
Côndilo medial
Corpo da tíbia
Tuberosidade da tíbia
Maléolo medial
Tubérculos intercondilares da eminência intercondilar
Margem interóssea

Fíbula:
Cabeça da fíbula
Corpo da fíbula
Maléolo lateral

Ossos do Pé:
Tálus
Calcâneo
Navicular
Cubóide
Cuneiforme medial
Cuneiforme intermédio
Cuneiforme lateral

Ossos metatarsais (I ao V)
Falanges (proximal, média e distal)

`,

"Crânio":`

Neurocrânio:
Frontal
Parietais (2)
Temporais (2)
Occipital
Esfenoide
Etmoide

Viscerocrânio:
Nasais (2)
Maxilas (2)
Zigomáticos (2)
Lacrimais (2)
Palatinos (2)
Conchas Nasais Inferiores (2)
Vômer
Mandíbula

`,

"Coluna Vertebral":`

A coluna vertebral é dividida em quatro regiões:

cervical  
torácica  
lombar

As regiões cervical e lombar apresentam lordose  
(concavidade para trás)

As regiões torácica e sacral exibem cifose  
(convexidade para trás)

Identificar nas vértebras cervicais, torácicas e lombares:

corpo  
canal vertebral  
processos articulares  
processo transverso  
processo espinhoso  

Identificar:

CI ou atlas  
CII ou axis  
CVII ou vértebra proeminente  

Nas vértebras torácicas:

fóveas costais  
fóvea costal do processo transverso  

No sacro:

Promontório  
Asas Sacrais  
Processos Articulares Superiores Direito e Esquerdo  
Canal Sacral  

`

}

let fotos = {}

const tabs = document.getElementById("tabs")

Object.keys(roteiro).forEach(r => {

let b = document.createElement("button")

b.innerText = r

b.onclick = () => abrir(r)

tabs.appendChild(b)

})

function abrir(osso){

document.getElementById("conteudo").innerHTML = `

<h2>${osso}</h2>

<pre>${roteiro[osso]}</pre>

<button onclick="ler('${osso}')">
Ler roteiro
</button>

<input type="file" accept="image/*" capture="environment" multiple onchange="foto(event,'${osso}')">

<div id="galeria"></div>

`

}

function ler(osso){

let msg = new SpeechSynthesisUtterance(roteiro[osso])

msg.lang = "pt-BR"

speechSynthesis.speak(msg)

}

function foto(e,osso){

if(!fotos[osso]) fotos[osso]=[]

for(let f of e.target.files){

let url = URL.createObjectURL(f)

fotos[osso].push(url)

}

let g=document.getElementById("galeria")

g.innerHTML=""

fotos[osso].forEach(i=>{

g.innerHTML+=`<img src="${i}">`

})

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let pdf=new jsPDF()

let y=10

Object.keys(roteiro).forEach(osso=>{

pdf.text(osso,10,y)

y+=10

})

pdf.save("roteiro_esqueleto.pdf")

}

function modo(){

document.body.classList.toggle("dark")

}

</script>

<script>

if('serviceWorker' in navigator){

navigator.serviceWorker.register("sw.js")

}

</script>

</body>
</html>
