<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#7bb8d9">
  <meta name="description" content="Estude cada osso com notas e fotos anexadas">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sistema Esquelético">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%237bb8d9' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'>🦴</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%237bb8d9' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'>🦴</text></svg>">
  <title>Sistema Esquelético</title>
  <style>
    :root {
      --bg: #f7fbff;
      --panel: #ffffff;
      --line: #d8e5f2;
      --text: #1f2a37;
      --muted: #607489;
      --primary: #7bb8d9;
      --primary-2: #a7d7c5;
      --accent: #f7c6c7;
      --shadow: 0 12px 28px rgba(61, 102, 140, 0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { 
      height: 100%; 
      margin: 0; 
      width: 100%; 
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(167, 215, 197, 0.35), transparent 28%),
        radial-gradient(circle at top right, rgba(247, 198, 199, 0.35), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }

    input, textarea, button { -webkit-app-region: no-drag; }

    .app-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }

    .app-container {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      padding: clamp(8px, 2vw, 12px);
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .hero {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(216, 229, 242, 0.92);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: clamp(12px, 3vw, 14px);
      display: grid;
      gap: clamp(8px, 2vw, 12px);
      flex-shrink: 0;
    }

    .hero-top {
      display: flex;
      gap: clamp(8px, 2vw, 10px);
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
    }

    h1 {
      margin: 0;
      font-size: clamp(1rem, 5vw, 1.8rem);
      line-height: 1.1;
      word-break: break-word;
    }

    .subtitle {
      margin: 4px 0 0 0;
      color: var(--muted);
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(6px, 1.5vw, 8px);
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: clamp(8px, 2vw, 10px) clamp(10px, 2.5vw, 13px);
      min-height: 44px;
      cursor: pointer;
      font-weight: 700;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.16s ease, filter 0.16s ease;
      white-space: nowrap;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn:hover:not(:disabled) { transform: translateY(-1px); filter: saturate(1.04); }
    .btn:active:not(:disabled) { transform: translateY(1px); }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), #8fc4e0);
      color: #11324a;
      box-shadow: 0 6px 14px rgba(123, 184, 217, 0.22);
    }

    .btn.secondary {
      background: linear-gradient(135deg, var(--primary-2), #c2eadb);
      color: #23483c;
      box-shadow: 0 6px 14px rgba(167, 215, 197, 0.22);
    }

    .btn.tertiary {
      background: linear-gradient(135deg, var(--accent), #ffd8d9);
      color: #5b2b2c;
      box-shadow: 0 6px 14px rgba(247, 198, 199, 0.22);
    }

    .btn.soft {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
      padding: clamp(6px, 1.5vw, 8px) clamp(8px, 2vw, 11px);
      font-size: clamp(0.7rem, 1.8vw, 0.85rem);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(260px, 280px) 1fr;
      gap: clamp(8px, 2vw, 12px);
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(216, 229, 242, 0.92);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: clamp(10px, 2vw, 12px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(8px, 1.5vw, 10px);
      overflow: hidden;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: clamp(8px, 2vw, 10px) clamp(10px, 2vw, 12px);
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }

    .search:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(123, 184, 217, 0.15);
    }

    .tab-list {
      overflow: auto;
      display: grid;
      gap: clamp(4px, 1vw, 6px);
      padding-right: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .tab-btn {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: #f1f7ff;
      padding: clamp(8px, 2vw, 10px) clamp(10px, 2vw, 12px);
      border-radius: 14px;
      cursor: pointer;
      color: var(--text);
      font-weight: 700;
      font-size: clamp(0.8rem, 2vw, 0.9rem);
      transition: all 0.2s ease;
      -webkit-user-select: none;
      user-select: none;
    }

    .tab-btn small {
      display: block;
      margin-top: 3px;
      font-weight: 600;
      font-size: clamp(0.65rem, 1.5vw, 0.78rem);
      color: var(--muted);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(123, 184, 217, 0.22), rgba(167, 215, 197, 0.18));
      border-color: rgba(123, 184, 217, 0.45);
    }

    .content {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(216, 229, 242, 0.92);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: clamp(12px, 3vw, 14px);
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 2vw, 12px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .section-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: clamp(11px, 2.5vw, 13px);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .section-card h2 {
      margin: 0 0 8px 0;
      font-size: clamp(1rem, 3vw, 1.2rem);
      word-break: break-word;
    }

    .section-card h3 {
      margin: 0 0 8px 0;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
    }

    .section-card p {
      margin: 0;
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      line-height: 1.5;
      word-break: break-word;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(4px, 1.5vw, 6px);
      margin-bottom: 8px;
    }

    .pill {
      background: #f1f7ff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px clamp(8px, 2vw, 10px);
      font-size: clamp(0.65rem, 1.5vw, 0.78rem);
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .note-box {
      width: 100%;
      min-height: 120px;
      max-height: 40vh;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 11px;
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      line-height: 1.4;
      outline: none;
      background: #fff;
      font-family: inherit;
      -webkit-user-select: text;
      user-select: text;
    }

    .note-box:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(123, 184, 217, 0.15);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(6px, 1.5vw, 8px);
      margin-top: 10px;
      align-items: center;
    }

    .hint {
      color: var(--muted);
      font-size: clamp(0.75rem, 1.8vw, 0.85rem);
      margin: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(100px, 20vw, 140px), 1fr));
      gap: clamp(8px, 2vw, 10px);
      margin-top: 10px;
    }

    .media-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      display: grid;
      grid-template-rows: auto 1fr;
      position: relative;
    }

    .media-card img {
      width: 100%;
      height: clamp(100px, 20vw, 140px);
      object-fit: cover;
      display: block;
      background: #eef6ff;
    }

    .media-card .body {
      padding: clamp(6px, 1.5vw, 8px);
      display: flex;
      flex-direction: column;
      gap: clamp(4px, 1vw, 6px);
    }

    .media-card .actions {
      gap: 4px;
      margin-top: 4px;
    }

    .file-name {
      font-weight: 700;
      word-break: break-word;
      font-size: clamp(0.75rem, 1.8vw, 0.85rem);
    }

    .file-meta {
      color: var(--muted);
      font-size: clamp(0.65rem, 1.5vw, 0.75rem);
    }

    .empty {
      padding: clamp(12px, 3vw, 16px);
      text-align: center;
      color: var(--muted);
      font-size: clamp(0.8rem, 2vw, 0.9rem);
    }

    .hidden { display: none !important; }

    .footer-note {
      font-size: clamp(0.7rem, 1.8vw, 0.8rem);
      color: var(--muted);
      text-align: center;
      padding: clamp(10px, 2vw, 12px);
      margin: 0;
      flex-shrink: 0;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.1);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: clamp(12px, 5vw, 16px);
      left: 50%;
      transform: translateX(-50%);
      background: #1f2a37;
      color: white;
      padding: clamp(10px, 2vw, 12px) clamp(12px, 3vw, 16px);
      border-radius: 12px;
      font-size: clamp(0.8rem, 2vw, 0.9rem);
      z-index: 9999;
      max-width: 90%;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Tablet (768px - 1024px) */
    @media (max-width: 1024px) and (min-width: 769px) {
      .layout {
        grid-template-columns: minmax(240px, 260px) 1fr;
        gap: 10px;
      }

      .btn {
        min-height: 42px;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }

      .media-card img {
        height: 120px;
      }
    }

    /* Mobile landscape (tablet and phones) */
    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .sidebar {
        display: grid;
        grid-template-columns: auto 1fr;
        grid-template-rows: auto;
        max-height: 60px;
        gap: 10px;
      }

      .search {
        order: 2;
        min-width: 200px;
      }

      .tab-list {
        display: none;
      }

      .toolbar {
        gap: 6px;
      }

      .btn {
        padding: 8px 10px;
        font-size: 0.85rem;
        min-height: 40px;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      }

      .media-card img {
        height: 110px;
      }

      .hero {
        padding: 12px;
      }

      .app-container {
        padding: 10px;
      }

      .content {
        padding: 12px;
      }

      .note-box {
        max-height: 35vh;
      }
    }

    /* Small phones (480px and below) */
    @media (max-width: 480px) {
      body {
        font-size: 16px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .hero-top {
        flex-direction: column;
        gap: 8px;
      }

      .toolbar {
        gap: 6px;
        margin-top: 8px;
        width: 100%;
      }

      .btn {
        padding: 8px 9px;
        font-size: 0.75rem;
        min-height: 44px;
        flex: 1;
        min-width: 70px;
      }

      h1 {
        font-size: 1.1rem;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
      }

      .media-card img {
        height: 95px;
      }

      .note-box {
        max-height: 30vh;
      }

      .app-container {
        padding: 8px;
      }

      .hero {
        padding: 10px;
      }

      .content {
        padding: 10px;
      }

      .section-card {
        padding: 10px;
      }
    }

    /* Large screens (1440px+) */
    @media (min-width: 1441px) {
      .layout {
        grid-template-columns: 300px 1fr;
        gap: 16px;
      }

      .app-container {
        padding: 16px;
      }

      .hero {
        padding: 16px;
        gap: 14px;
      }

      .sidebar {
        padding: 14px;
      }

      .content {
        padding: 16px;
        gap: 14px;
      }

      .btn {
        min-height: 44px;
      }
    }

    /* Landscape orientation adjustments */
    @media (max-height: 600px) and (min-width: 768px) {
      .app-container {
        padding: 8px;
      }

      .hero {
        padding: 10px;
        gap: 8px;
      }

      .hero-top {
        gap: 8px;
      }

      .note-box {
        min-height: 80px;
        max-height: 150px;
      }

      .section-card {
        padding: 10px;
      }
    }

    /* Safe area support for notched devices */
    @supports (padding: max(0px)) {
      body {
        padding-left: max(0px, env(safe-area-inset-left));
        padding-right: max(0px, env(safe-area-inset-right));
        padding-top: max(0px, env(safe-area-inset-top));
        padding-bottom: max(0px, env(safe-area-inset-bottom));
      }

      .footer-note {
        padding-bottom: max(12px, calc(12px + env(safe-area-inset-bottom)));
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
 </head>
 <body>
  <div class="app-wrapper">
   <div class="app-container">
    <header class="hero">
     <div class="hero-top">
      <div>
       <h1 id="appTitle">Roteiro prático sistema esquelético</h1>
       <p class="subtitle">Estude cada osso com notas e fotos anexadas.</p>
      </div>
      <div class="toolbar">
       <button class="btn primary" id="installBtn">Baixar app</button> <button class="btn primary" id="pdfBtn">Gerar PDF</button> <button class="btn secondary" id="backupBtn">Salvar backup</button> <label class="btn soft" for="restoreInput">Restaurar backup</label> <input id="restoreInput" class="hidden" type="file" accept=".json">
      </div>
     </div>
     <p class="hint">Clique em um osso para estudar. Suas anotações e fotos são salvas automaticamente.</p>
    </header>
    <main class="layout">
     <aside class="sidebar">
      <input class="search" id="searchInput" type="search" placeholder="Buscar osso...">
      <div class="tab-list" id="tabList"></div>
     </aside>
     <section id="contentArea" class="content"></section>
    </main>
   </div>
   <p class="footer-note">Sistema de estudo prático do esqueleto humano</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script>
    const bones = [
      { id: 'clavicula', nome: 'Clavícula', grupo: 'Membro superior', instrucoes: 'Posicione a extremidade acromial lateralmente, a face lisa superiormente, a maior convexidade anteriormente e o processo conóide inferiormente.' },
      { id: 'escapula', nome: 'Escápula', grupo: 'Membro superior', instrucoes: 'Posicione a espinha da escápula superior e posteriormente, com a cavidade glenóide e o acrômio lateralmente; a fossa subescapular e o processo coracóide ficam anteriormente.' },
      { id: 'umero', nome: 'Úmero', grupo: 'Membro superior', instrucoes: 'Posicione a cabeça do úmero proximal e medialmente, e a fossa do olécrano posteriormente. Observe tubérculo maior, tubérculo menor, sulco intertubercular, colo anatômico e cirúrgico; distalmente, tróclea, capítulo e epicôndilos.' },
      { id: 'radio', nome: 'Rádio', grupo: 'Membro superior', instrucoes: 'É o osso lateral do antebraço. Posicione a face anterior côncava anteriormente, a cabeça proximalmente, a tuberosidade medialmente e o processo estilóide lateralmente.' },
      { id: 'ulna', nome: 'Ulna', grupo: 'Membro superior', instrucoes: 'É o osso medial do antebraço. Posicione a cabeça distalmente, o olécrano e processo coronoide proximalmente, a borda interóssea lateralmente e o processo estilóide medialmente.' },
      { id: 'carpo', nome: 'Ossos do carpo', grupo: 'Membro superior', instrucoes: 'Fileira proximal: escafóide, semilunar, piramidal e pisiforme. Fileira distal: trapézio, trapezóide, capitato e hamato.' },
      { id: 'metacarpo', nome: 'Metacarpos', grupo: 'Membro superior', instrucoes: 'Identifique os metacarpos I a V.' },
      { id: 'falanges_mao', nome: 'Falanges da mão', grupo: 'Membro superior', instrucoes: 'Identifique falanges proximais, médias e distais.' },
      { id: 'quadril', nome: 'Osso do quadril', grupo: 'Membro inferior', instrucoes: 'Identifique ílio, ísquio e púbis. Posicione a crista ilíaca superiormente, o acetábulo ântero-lateralmente, púbis e espinha ilíaca ântero-superior anteriormente e o forame obturado inferior ao acetábulo.' },
      { id: 'femur', nome: 'Fêmur', grupo: 'Membro inferior', instrucoes: 'Posicione cabeça e colo proximal e medialmente; côndilos distalmente. Identifique trocanter maior e menor, incisura intercondilar e face patelar.' },
      { id: 'patela', nome: 'Patela', grupo: 'Membro inferior', instrucoes: 'Posicione o ápice inferiormente, a base superiormente e a face articular posteriormente, com a parte maior lateralmente.' },
      { id: 'tibia', nome: 'Tíbia', grupo: 'Membro inferior', instrucoes: 'É o osso medial da perna. Posicione os côndilos superiormente, a tuberosidade tibial anteriormente, o maléolo medial infero-medialmente e a incisura fibular lateralmente.' },
      { id: 'fibula', nome: 'Fíbula', grupo: 'Membro inferior', instrucoes: 'É o osso lateral da perna. Posicione a cabeça superiormente, a face articular do maléolo lateral medialmente e a fossa do maléolo posteriormente.' },
      { id: 'tarso', nome: 'Ossos do tarso', grupo: 'Membro inferior', instrucoes: 'Identifique tálus, calcâneo, navicular, cubóide e cuneiformes medial, intermédio e lateral.' },
      { id: 'metatarso', nome: 'Metatarsos', grupo: 'Membro inferior', instrucoes: 'Identifique os metatarsos I a V.' },
      { id: 'falanges_pe', nome: 'Falanges do pé', grupo: 'Membro inferior', instrucoes: 'Identifique falanges proximais, médias e distais.' },
      { id: 'frontal', nome: 'Frontal', grupo: 'Crânio', instrucoes: 'Verifique a incisura frontal e o forame supraorbital.' },
      { id: 'occipital', nome: 'Occipital', grupo: 'Crânio', instrucoes: 'Identifique o forame magno e os côndilos occipitais.' },
      { id: 'esfenoide', nome: 'Esfenóide', grupo: 'Crânio', instrucoes: 'Observe asas maiores, asas menores e a fossa hipofisária.' },
      { id: 'etmoide', nome: 'Etmóide', grupo: 'Crânio', instrucoes: 'Observe a crista galli, a lâmina crivosa e as células etmoidais.' },
      { id: 'parietal', nome: 'Parietais', grupo: 'Crânio', instrucoes: 'Identifique os parietais direito e esquerdo.' },

    let activeBoneId = bones[0].id;

    let photoDb = null;

    // IndexedDB for photos
    function initDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('SkeletalPhotos', 1);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => {
          photoDb = req.result;
          resolve();
        };
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('photos')) {
            const store = db.createObjectStore('photos', { keyPath: 'id' });
            store.createIndex('boneId', 'boneId', { unique: false });
          }
        };
      });
    }

    function escapeHtml(text = '') {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function escapeHtmlAttr(text = '') {
      return escapeHtml(text).replaceAll('"', '&quot;');
    }

    function formatBytes(bytes) {
      if (!bytes) return '';
      const units = ['B', 'KB', 'MB', 'GB'];
      let i = 0, n = bytes;
      while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(n < 10 && i > 0 ? 1 : 0)} ${units[i]}`;
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function getEntry(boneId) {
      return allData.find(e => e.bone_id === boneId) || { bone_id: boneId, notes: '', photo_count: 0 };
    }

    async function getPhotos(boneId) {
      return new Promise((resolve) => {
        const tx = photoDb.transaction('photos', 'readonly');
        const store = tx.objectStore('photos');
        const idx = store.index('boneId');
        const req = idx.getAll(boneId);
        req.onsuccess = () => resolve(req.result || []);
      });
    }

    async function saveEntry(boneId, notes) {
      const photoCount = (await getPhotos(boneId)).length;
      
      const payload = {
        bone_id: boneId,
        notes: notes,
        photo_count: photoCount
      };

      const index = allData.findIndex(e => e.bone_id === boneId);
      if (index >= 0) {
        allData[index] = payload;
      } else {
        allData.push(payload);
      }

      localStorage.setItem('skeletalNotes', JSON.stringify(allData));
    }

    function renderTabs(filter = '') {
      const tabList = document.getElementById('tabList');
      const query = filter.trim().toLowerCase();

      const filtered = bones.filter(b =>
        b.nome.toLowerCase().includes(query) ||
        b.grupo.toLowerCase().includes(query)
      );

      tabList.innerHTML = '';

      if (filtered.length === 0) {
        tabList.innerHTML = '<div class="empty">Nenhum osso encontrado.</div>';
        return;
      }

      filtered.forEach(bone => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tab-btn' + (bone.id === activeBoneId ? ' active' : '');
        const entry = getEntry(bone.id);
        btn.innerHTML = `<span>${escapeHtml(bone.nome)}</span><small>${escapeHtml(bone.grupo)}</small>`;
        btn.addEventListener('click', async () => {
          activeBoneId = bone.id;
          renderTabs(document.getElementById('searchInput').value);
          await renderContent();
        });
        tabList.appendChild(btn);
      });
    }

    async function renderContent() {
      const bone = bones.find(b => b.id === activeBoneId) || bones[0];
      const entry = getEntry(bone.id);
      const photos = await getPhotos(bone.id);

      const content = document.getElementById('contentArea');
      content.innerHTML = `
        <div class="section-card">

        <div class="section-card">

        <div class="section-card">

          <div id="imagesWrap">

                      <div class="actions">

      const noteBox = document.getElementById('noteBox');
      if (noteBox) {
        let saveTimeout;
        noteBox.addEventListener('input', (e) => {
          clearTimeout(saveTimeout);
          saveTimeout = setTimeout(async () => {
            await saveEntry(bone.id, e.target.value);
          }, 500);
        });
      }

      const cameraInput = document.getElementById('cameraInput');
      if (cameraInput) {
        cameraInput.addEventListener('change', async (e) => {
          await addPhotos(bone.id, Array.from(e.target.files || []));
          e.target.value = '';
        });
      }

      const fileInput = document.getElementById('fileInput');
      if (fileInput) {
        fileInput.addEventListener('change', async (e) => {
          await addPhotos(bone.id, Array.from(e.target.files || []));

      document.querySelectorAll('.remove-file-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const photoId = btn.dataset.photoid;

          await renderContent();
        });
      });
    }

    async function deletePhoto(photoId) {
      return new Promise((resolve) => {
        const tx = photoDb.transaction('photos', 'readwrite');
        const store = tx.objectStore('photos');
        store.delete(photoId);
        tx.oncomplete = resolve;
      });
    }

    async function addPhotos(boneId, files) {
      if (!files || !files.length) return;

      for (const file of files) {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });

        const photo = {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          boneId: boneId,
          name: file.name || 'foto',
          type: file.type || 'image/jpeg',
          size: file.size || 0,
          dataUrl: dataUrl,
          createdAt: new Date().toISOString()
        };

        await new Promise((resolve) => {
          const tx = photoDb.transaction('photos', 'readwrite');
          const store = tx.objectStore('photos');
          store.add(photo);
          tx.oncomplete = resolve;
        });
      }

      await saveEntry(boneId, getEntry(boneId).notes);
      await renderContent();
      showToast('Fotos salvas no dispositivo!');
    }

    async function exportBackup() {
      const payload = {
        app: 'Sistema Esquelético',
        version: 2,
        exportedAt: new Date().toISOString(),
        entries: allData,
        photos: await getAllPhotos()
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'sistema-esqueletico-backup.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Backup exportado com sucesso!');
    }

    async function getAllPhotos() {
      return new Promise((resolve) => {
        const tx = photoDb.transaction('photos', 'readonly');
        const store = tx.objectStore('photos');
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
      });
    }

    async function restoreBackup(file) {
      if (!file) return;

      try {
        const text = await file.text();
        const json = JSON.parse(text);

        if (!Array.isArray(json.entries)) {
          throw new Error('Backup inválido');
        }

        // Restore entries
        for (const entry of json.entries) {
          await window.dataSdk.create({
            bone_id: entry.bone_id,
            notes: entry.notes || '',
            photo_count: entry.photo_count || 0
          });
        }

        // Restore photos
        if (json.photos && Array.isArray(json.photos)) {
          for (const photo of json.photos) {
            await new Promise((resolve) => {
              const tx = photoDb.transaction('photos', 'readwrite');
              const store = tx.objectStore('photos');
              store.add(photo);
              tx.oncomplete = resolve;
            });
          }
        }

        showToast('Backup restaurado com sucesso!');
        location.reload();
      } catch (error) {
        console.error(error);
        showToast('Erro ao restaurar backup.');
      }
    }

    async function addImageToPdf(pdf, dataUrl, x, y, width) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          const compressed = canvas.toDataURL("image/jpeg", 0.85);
          const ratio = img.height / img.width;
          const height = width * ratio;
          pdf.addImage(compressed, "JPEG", x, y, width, height);
          resolve(height);
        };
        img.onerror = () => resolve(0);
        img.src = dataUrl;
      });
    }

    async function generateCompletePDF() {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: 'a4',
        compress: true
      });

      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const margin = 12;
      const contentWidth = pageWidth - 2 * margin;
      let yPosition = margin;

      // Title
      pdf.setFontSize(28);
      pdf.setFont(undefined, 'bold');
      pdf.text('Sistema Esquelético', pageWidth / 2, yPosition, { align: 'center' });
      yPosition += 12;

      pdf.setFontSize(11);
      pdf.setFont(undefined, 'normal');
      pdf.text(`Gerado em ${new Date().toLocaleDateString('pt-BR')}`, pageWidth / 2, yPosition, { align: 'center' });
      yPosition += 8;

      // Group bones by category
      const groups = {};
      bones.forEach(bone => {
        if (!groups[bone.grupo]) groups[bone.grupo] = [];
        groups[bone.grupo].push(bone);
      });

      // Process each group
      for (const [groupName, groupBones] of Object.entries(groups)) {
        // Add page break if needed
        if (yPosition > pageHeight - 60) {
          pdf.addPage();
          yPosition = margin;
        }

        // Group header
        pdf.setFontSize(16);
        pdf.setFont(undefined, 'bold');
        pdf.setTextColor(123, 184, 217);
        pdf.text(groupName, margin, yPosition);
        yPosition += 8;
        pdf.setTextColor(0, 0, 0);

        // Process each bone
        for (const bone of groupBones) {
          // Check if we need a new page
          if (yPosition > pageHeight - 50) {
            pdf.addPage();
            yPosition = margin;
          }

          const entry = getEntry(bone.id);
          const photos = await getPhotos(bone.id);

          // Bone name
          pdf.setFontSize(13);
          pdf.setFont(undefined, 'bold');
          pdf.text(bone.nome, margin, yPosition);
          yPosition += 6;

          // Instructions
          pdf.setFontSize(10);
          pdf.setFont(undefined, 'normal');
          const instrucoes = bone.instrucoes || '';
          const splitInstrucoes = pdf.splitTextToSize(instrucoes, contentWidth);
          pdf.text(splitInstrucoes, margin, yPosition);
          yPosition += splitInstrucoes.length * 4.5 + 2;

          // Notes if any
          if (entry.notes && entry.notes.trim()) {
            if (yPosition > pageHeight - 40) {
              pdf.addPage();
              yPosition = margin;
            }

            pdf.setFont(undefined, 'bold');
            pdf.setFontSize(10);
            pdf.text('Anotações:', margin, yPosition);
            yPosition += 4;

            pdf.setFont(undefined, 'normal');
            pdf.setFontSize(9);
            const splitNotes = pdf.splitTextToSize(entry.notes, contentWidth);
            pdf.text(splitNotes, margin, yPosition);
            yPosition += splitNotes.length * 3.5 + 3;
          }

          // Photos if any
          if (photos.length > 0) {
            if (yPosition > pageHeight - 50) {
              pdf.addPage();
              yPosition = margin;
            }

            pdf.setFont(undefined, 'bold');
            pdf.setFontSize(10);
            pdf.text(`Fotos (${photos.length}):`, margin, yPosition);
            yPosition += 5;

            let photoX = margin;
            let photoY = yPosition;
            const photoWidth = (contentWidth - 4) / 2;

            for (let i = 0; i < photos.length; i++) {
              // Check if we need a new page
              if (photoY + 50 > pageHeight - 15) {
                pdf.addPage();
                photoX = margin;
                photoY = margin;
              }

              const height = await addImageToPdf(pdf, photos[i].dataUrl, photoX, photoY, photoWidth);

              photoX += photoWidth + 2;

              // Start new row after 2 photos
              if ((i + 1) % 2 === 0) {
                photoX = margin;
                photoY += height + 2;
              }
            }

            yPosition = photoY + 60;
          }

          yPosition += 4;
        }

        yPosition += 6;
      }

      pdf.save('sistema-esqueletico-completo.pdf');
    }

    async function init() {
