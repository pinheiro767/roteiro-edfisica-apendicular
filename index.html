<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anatomia Óssea</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e1117;
      --surface: #181d27;
      --card: #1f2635;
      --border: #2a3247;
      --accent: #4f8ef7;
      --accent2: #6ec6a0;
      --accent3: #f7a84f;
      --text: #e8eaf0;
      --muted: #7a85a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, .app-root {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app-root {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100%;
    }

    /* Header */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-content { display: flex; align-items: center; gap: 12px; }

    .header-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #7b5df7);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--text);
      line-height: 1.2;
    }

    .header-text p { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .stat-chips { display: flex; gap: 8px; }

    .chip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    .chip span { color: var(--accent); font-weight: 600; }

    /* Search */
    .search-bar {
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-wrap { position: relative; }

    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px 8px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }

    .search-clear {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); cursor: pointer;
      background: none; border: none; padding: 2px;
      display: none;
    }

    .search-clear:hover { color: var(--text); }

    /* Body layout */
    .body-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* Sidebar */
    .sidebar {
      width: 210px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 8px;
    }

    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-section-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 8px 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
      font-size: 12.5px;
      border: 1px solid transparent;
      margin-bottom: 1px;
    }

    .sidebar-item:hover { background: var(--card); color: var(--text); }

    .sidebar-item.active {
      background: var(--card);
      color: var(--accent);
      border-color: var(--border);
    }

    .sidebar-item .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }

    .sidebar-item.active .dot { background: var(--accent); }

    /* Main content */
    .main-content {
      flex: 1;
      overflow-y: auto;
      min-width: 0;
      padding: 20px;
      background: var(--bg);
    }

    .main-content::-webkit-scrollbar { width: 4px; }
    .main-content::-webkit-scrollbar-track { background: transparent; }
    .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Cards */
    .bone-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .bone-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .bone-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), #7b5df7);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .bone-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(79,142,247,0.12); }
    .bone-card:hover::before { opacity: 1; }

    .bone-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .bone-card-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
    }

    .bone-card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: var(--text);
      line-height: 1.3;
    }

    .bone-card-latin {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      margin-top: 2px;
    }

    .bone-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 500;
    }

    .tag-blue { background: rgba(79,142,247,0.12); color: #7fb3ff; border: 1px solid rgba(79,142,247,0.2); }
    .tag-green { background: rgba(110,198,160,0.12); color: #8fdbb8; border: 1px solid rgba(110,198,160,0.2); }
    .tag-orange { background: rgba(247,168,79,0.12); color: #ffca7f; border: 1px solid rgba(247,168,79,0.2); }
    .tag-purple { background: rgba(123,93,247,0.12); color: #b09dff; border: 1px solid rgba(123,93,247,0.2); }

    .bone-card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Detail panel */
    .detail-panel {
      width: 360px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      display: none;
    }

    .detail-panel.open { display: flex; flex-direction: column; }

    .detail-panel::-webkit-scrollbar { width: 3px; }
    .detail-panel::-webkit-scrollbar-track { background: transparent; }
    .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .detail-header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .detail-close {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 12px;
      width: fit-content;
      transition: all 0.15s;
    }

    .detail-close:hover { color: var(--text); border-color: var(--accent); }

    .detail-bone-name {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
      line-height: 1.2;
    }

    .detail-bone-latin {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      margin-top: 3px;
    }

    .detail-body { padding: 16px 18px; flex: 1; }

    .detail-section {
      margin-bottom: 18px;
    }

    .detail-section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .detail-text {
      font-size: 12.5px;
      color: #c5c9d6;
      line-height: 1.65;
    }

    .detail-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .detail-list li {
      font-size: 12px;
      color: #c5c9d6;
      display: flex;
      align-items: flex-start;
      gap: 7px;
      line-height: 1.5;
    }

    .detail-list li::before {
      content: '›';
      color: var(--accent);
      font-size: 14px;
      flex-shrink: 0;
      margin-top: -1px;
    }

    .detail-alert {
      background: rgba(247,168,79,0.08);
      border: 1px solid rgba(247,168,79,0.25);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #ffca7f;
      line-height: 1.55;
      display: flex;
      gap: 8px;
    }

    .detail-alert-icon { flex-shrink: 0; margin-top: 1px; }

    .detail-info {
      background: rgba(79,142,247,0.07);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #93b8f7;
      line-height: 1.55;
      display: flex;
      gap: 8px;
    }

    .count-badge {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .count-badge .label { font-size: 11px; color: var(--muted); }
    .count-badge .value { font-size: 16px; font-weight: 600; color: var(--accent); font-family: 'DM Serif Display', serif; }

    /* Section view header */
    .section-header {
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
    }

    .section-header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; }

    /* Region pill nav */
    .region-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .region-pill {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--card);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .region-pill:hover { color: var(--text); border-color: var(--accent); }
    .region-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* Palpation highlight */
    .palpation-spot {
      background: rgba(110,198,160,0.08);
      border: 1px solid rgba(110,198,160,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 6px;
    }

    .palpation-spot .spot-name { font-size: 12px; font-weight: 600; color: #8fdbb8; margin-bottom: 2px; }
    .palpation-spot .spot-desc { font-size: 11.5px; color: #a0c8b8; line-height: 1.5; }

    /* Fracture risk */
    .fracture-item {
      background: rgba(247,79,100,0.07);
      border: 1px solid rgba(247,79,100,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 6px;
      font-size: 12px;
      color: #f79fb0;
      line-height: 1.5;
    }

    .fracture-item strong { color: #ff8fa3; display: block; margin-bottom: 2px; font-size: 11.5px; }

    /* Scrollbar for main content */
    .main-content::-webkit-scrollbar { width: 4px; }

    /* Animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bone-card { animation: fadeInUp 0.25s ease both; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .detail-panel.open { animation: slideIn 0.2s ease both; }

    /* Media section */
    .media-section {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .media-button {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.15s;
    }

    .media-button:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(79,142,247,0.08);
    }

    .media-gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .media-item {
      position: relative;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      overflow: hidden;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .media-item img,
    .media-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .media-item-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      font-size: 12px;
      border: none;
      transition: background 0.15s;
    }

    .media-item-remove:hover {
      background: rgba(0,0,0,0.8);
    }

    .file-input-hidden {
      display: none;
    }

    /* Mobile responsive */
    @media (max-width: 600px) {
      .sidebar { width: 0; display: none; }
      .detail-panel { width: 100%; position: absolute; top: 0; left: 0; height: 100%; z-index: 10; }
      .stat-chips { display: none; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>

 </head>

  <script>
// ─── Data ────────────────────────────────────────────────────────────────────
const BONES = [
  // CRÂNIO
  {
    id: 'frontal', name: 'Osso Frontal', latin: 'Os frontale', region: 'craneo',

// ─── State ────────────────────────────────────────────────────────────────────
let currentRegion = 'all';
let searchQuery = '';
let selectedBone = null;
let boneMedia = {}; // Store media for each bone: { [boneId]: [{ type: 'image'|'video', data: dataURL }] }

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  renderMain();

  // Search
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value.trim().toLowerCase();
    document.getElementById('searchClear').style.display = searchQuery ? 'block' : 'none';
    closeDetail();
    renderMain();
  });

  // Load media from localStorage
  const savedMedia = localStorage.getItem('boneMedia');
  if (savedMedia) {
    try {
      boneMedia = JSON.parse(savedMedia);
    } catch (e) {
      console.error('Failed to load media:', e);
    }
  }

  // SDK
  if (window.elementSdk) {
    const defaultConfig = {
      app_title: 'Anatomia Óssea',
      app_subtitle: 'Guia Interativo de Estruturas Ósseas',
      background_color: '#0e1117',
      surface_color: '#181d27',
      text_color: '#e8eaf0',
      accent_color: '#4f8ef7',
      muted_color: '#7a85a0'
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('appTitle').textContent = config.app_title || defaultConfig.app_title;
        document.getElementById('appSubtitle').textContent = config.app_subtitle || defaultConfig.app_subtitle;

        const bg = config.background_color || defaultConfig.background_color;
        const surf = config.surface_color || defaultConfig.surface_color;
        const txt = config.text_color || defaultConfig.text_color;
        const acc = config.accent_color || defaultConfig.accent_color;
        const mut = config.muted_color || defaultConfig.muted_color;

        document.documentElement.style.setProperty('--bg', bg);
        document.documentElement.style.setProperty('--surface', surf);
        document.documentElement.style.setProperty('--text', txt);
        document.documentElement.style.setProperty('--accent', acc);
        document.documentElement.style.setProperty('--muted', mut);
        document.body.style.background = bg;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }
          },
          {
            get: () => config.muted_color || defaultConfig.muted_color,
            set: (v) => { config.muted_color = v; window.elementSdk.setConfig({ muted_color: v }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['app_title', config.app_title || defaultConfig.app_title],
        ['app_subtitle', config.app_subtitle || defaultConfig.app_subtitle]
      ])
    });
  }
});

// ─── Filter & Search ──────────────────────────────────────────────────────────
function getFilteredBones() {
  let list = BONES;
  if (currentRegion !== 'all') {
    list = list.filter(b => b.region === currentRegion);
  }
  if (searchQuery) {
    list = list.filter(b =>
      b.name.toLowerCase().includes(searchQuery) ||
      b.latin.toLowerCase().includes(searchQuery) ||
      b.tags.some(t => t.toLowerCase().includes(searchQuery)) ||
      b.desc.toLowerCase().includes(searchQuery) ||
      b.region.toLowerCase().includes(searchQuery)
    );
  }
  return list;
}

// ─── Render Main ─────────────────────────────────────────────────────────────
function renderMain() {
  const main = document.getElementById('mainContent');

  // Special views
  if (currentRegion === 'contagem') { renderCountView(main); return; }
  if (currentRegion === 'fraturas') { renderFraturasView(main); return; }
  if (currentRegion === 'palpacao') { renderPalpacaoView(main); return; }

  const bones = getFilteredBones();

  const regionLabels = {
    all: 'Todos os Ossos', craneo: 'Crânio & Face', coluna: 'Coluna Vertebral',
    torax: 'Tórax', membros_sup: 'Membro Superior', pelve: 'Pelve',
    membros_inf: 'Membro Inferior', mao: 'Mão', pe: 'Pé'
  };

  let html = `<div class="section-header">
    <h2>${searchQuery ? `Resultados para "${searchQuery}"` : regionLabels[currentRegion] || 'Ossos'}</h2>
    <p>${bones.length} estrutura${bones.length !== 1 ? 's' : ''} encontrada${bones.length !== 1 ? 's' : ''}</p>
  </div>`;

  if (bones.length === 0) {
    html += `<div class="empty-state">
      <div class="icon">🔍</div>
      <h3>Nenhum osso encontrado</h3>
      <p>Tente uma busca diferente ou selecione outra região.</p>
    </div>`;
  } else {
    html += `<div class="bone-grid">`;
    bones.forEach((b, i) => {
      const tagHtml = b.tags.map((t, j) =>
        `<span class="tag ${b.tagStyles[j] || 'tag-blue'}">${t}</span>`
      ).join('');
      html += `<div class="bone-card" style="animation-delay:${i * 40}ms" onclick="openDetail('${b.id}')">
        <div class="bone-card-header">
          <div>
            <div class="bone-card-title">${b.name}</div>
            <div class="bone-card-latin">${b.latin}</div>
          </div>
          <div class="bone-card-icon" style="background:${getRegionColor(b.region)}">
            <span style="font-size:18px">${b.emoji}</span>
          </div>
        </div>
        <div class="bone-card-tags">${tagHtml}</div>
        <div class="bone-card-desc">${b.desc}</div>
      </div>`;
    });
    html += `</div>`;
  }

  main.innerHTML = html;
  lucide.createIcons();
}

function getRegionColor(r) {
  const m = {
    craneo: 'rgba(79,142,247,0.15)',
    coluna: 'rgba(110,198,160,0.15)',
    torax: 'rgba(247,168,79,0.15)',
    membros_sup: 'rgba(123,93,247,0.15)',
    pelve: 'rgba(247,79,130,0.15)',
    membros_inf: 'rgba(79,210,247,0.15)',
    mao: 'rgba(247,220,79,0.15)',
    pe: 'rgba(150,247,79,0.15)'
  };
  return m[r] || 'rgba(79,142,247,0.15)';
}

// ─── Detail Panel ─────────────────────────────────────────────────────────────
function openDetail(id) {
  const bone = BONES.find(b => b.id === id);
  if (!bone) return;
  selectedBone = bone;

  document.getElementById('detailName').textContent = bone.name;
  document.getElementById('detailLatin').textContent = bone.latin;

  const tagsEl = document.getElementById('detailTags');
  tagsEl.innerHTML = bone.tags.map((t, i) =>
    `<span class="tag ${bone.tagStyles[i] || 'tag-blue'}">${t}</span>`
  ).join('');

  const body = document.getElementById('detailBody');

  let html = '';

  // Media section
  html += `<div class="detail-section">
    <div class="detail-section-title">Mídia</div>
    <div class="media-section">
      <button class="media-button" onclick="capturePhoto('${bone.id}')">
        <i data-lucide="camera" style="width:13px;height:13px;"></i> Foto
      </button>
      <button class="media-button" onclick="addFile('${bone.id}')">
        <i data-lucide="paperclip" style="width:13px;height:13px;"></i> Arquivo
      </button>
    </div>
    <div class="media-gallery" id="media-gallery-${bone.id}"></div>
  </div>`;

  // Função
  html += `<div class="detail-section">
    <div class="detail-section-title">Função</div>
    <p class="detail-text">${bone.funcao}</p>
  </div>`;

  // Acidentes ósseos
  html += `<div class="detail-section">
    <div class="detail-section-title">Acidentes Ósseos</div>
    <ul class="detail-list">
      ${bone.acidentes.map(a => `<li>${a}</li>`).join('')}
    </ul>
  </div>`;

  // Articulações
  if (bone.ossos_relacionados.length > 0) {
    html += `<div class="detail-section">
      <div class="detail-section-title">Articulações / Relações</div>
      <ul class="detail-list">
        ${bone.ossos_relacionados.map(o => `<li>${o}</li>`).join('')}
      </ul>
    </div>`;
  }

  // Palpação
  if (bone.palpacao && bone.palpacao.length > 0) {
    html += `<div class="detail-section">
      <div class="detail-section-title">Pontos de Palpação</div>
      ${bone.palpacao.map(p => `
        <div class="palpation-spot">
          <div class="spot-name">${p.nome}</div>
          <div class="spot-desc">${p.desc}</div>
        </div>
      `).join('')}
    </div>`;
  }

  // Clínica
  if (bone.clinica) {
    html += `<div class="detail-section">
      <div class="detail-section-title">Relevância Clínica</div>
      <div class="detail-info">
        <div style="flex-shrink:0;margin-top:1px;"><i data-lucide="stethoscope" style="width:13px;height:13px;color:#93b8f7;"></i></div>
        <p>${bone.clinica}</p>
      </div>
    </div>`;
  }

  // Fraturas
  if (bone.fraturas && bone.fraturas.length > 0) {
    html += `<div class="detail-section">
      <div class="detail-section-title">Fraturas Comuns</div>
      ${bone.fraturas.map(f => `
        <div class="fracture-item">
          <strong>${f.nome}</strong>${f.desc}
        </div>
      `).join('')}
    </div>`;
  }

  // Count
  html += `<div class="detail-section">
    <div class="detail-section-title">Contagem</div>
    <div class="count-badge">
      <span class="label">Quantidade no corpo adulto</span>
      <span class="value">${bone.count}</span>
    </div>
  </div>`;

  body.innerHTML = html;

  const panel = document.getElementById('detailPanel');
  panel.classList.add('open');
  lucide.createIcons();

  // Populate media gallery
  refreshMediaGallery(bone.id);
}

// ─── Media Functions ──────────────────────────────────────────────────────────
function capturePhoto(boneId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        if (!boneMedia[boneId]) boneMedia[boneId] = [];
        boneMedia[boneId].push({ type: 'image', data: event.target.result });
        saveMedia();
        refreshMediaGallery(boneId);
      };
      reader.readAsDataURL(file);
    }
  };
  
  input.click();
}

function addFile(boneId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*,video/*';
  
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const type = file.type.startsWith('video') ? 'video' : 'image';
        if (!boneMedia[boneId]) boneMedia[boneId] = [];
        boneMedia[boneId].push({ type, data: event.target.result });
        saveMedia();
        refreshMediaGallery(boneId);
      };
      reader.readAsDataURL(file);
    }
  };
  
  input.click();
}

function removeMedia(boneId, index) {
  if (boneMedia[boneId]) {
    boneMedia[boneId].splice(index, 1);
    if (boneMedia[boneId].length === 0) {
      delete boneMedia[boneId];
    }
    saveMedia();
    refreshMediaGallery(boneId);
  }
}

function saveMedia() {
  localStorage.setItem('boneMedia', JSON.stringify(boneMedia));
}

function refreshMediaGallery(boneId) {
  const gallery = document.getElementById(`media-gallery-${boneId}`);
  if (!gallery) return;
  
  const media = boneMedia[boneId] || [];
  gallery.innerHTML = media.map((m, i) => {
    const tag = m.type === 'video' ? `<video><source src="${m.data}"></video>` : `<img src="${m.data}" alt="Foto">`;
    return `<div class="media-item">
      ${tag}
      <button class="media-item-remove" onclick="removeMedia('${boneId}', ${i})">
        <i data-lucide="x" style="width:12px;height:12px;"></i>
      </button>
    </div>`;
  }).join('');
  
  lucide.createIcons();
}

function closeDetail() {
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('open');
  selectedBone = null;
}

// ─── Special Views ────────────────────────────────────────────────────────────
function renderCountView(main) {
  const regions = {
    'Crânio & Face': BONES.filter(b => b.region === 'craneo'),
    'Coluna Vertebral': BONES.filter(b => b.region === 'coluna'),
    'Tórax': BONES.filter(b => b.region === 'torax'),
    'Membro Superior': BONES.filter(b => b.region === 'membros_sup'),
    'Pelve': BONES.filter(b => b.region === 'pelve'),
    'Membro Inferior': BONES.filter(b => b.region === 'membros_inf'),
    'Mão': BONES.filter(b => b.region === 'mao'),
    'Pé': BONES.filter(b => b.region === 'pe')
  };

  let html = `<div class="section-header"><h2>Contagem Óssea</h2><p>Referência para o esqueleto adulto</p></div>`;

  html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px;">`;

  Object.entries(regions).forEach(([label, bones]) => {
    const total = bones.reduce((s, b) => s + b.count, 0);
    html += `<div class="count-badge" style="flex-direction:column;align-items:flex-start;gap:4px;padding:14px;">
      <span class="label" style="font-size:12px;font-weight:600;color:var(--text);">${label}</span>
      <span class="value" style="font-size:24px;">${total}</span>
      <span style="font-size:10px;color:var(--muted);">${bones.length} estruturas catalogadas</span>
    </div>`;
  });

  html += `</div>`;

  const grandTotal = BONES.reduce((s, b) => s + b.count, 0);
  html += `<div class="detail-info" style="margin-bottom:16px;">
    <div style="flex-shrink:0;"><i data-lucide="info" style="width:13px;height:13px;"></i></div>
    <p>Total catalogado neste guia: <strong>${grandTotal} ossos</strong>. O esqueleto adulto possui aproximadamente <strong>206 ossos</strong> no total. Recém-nascidos têm ~270 ossos, que se fundem ao longo do crescimento.</p>
  </div>`;

  main.innerHTML = html;
  lucide.createIcons();
}

function renderFraturasView(main) {
  const bonesWithFractures = BONES.filter(b => b.fraturas && b.fraturas.length > 0);

  let html = `<div class="section-header"><h2>Fraturas Comuns</h2><p>Referência rápida de fraturas por estrutura óssea</p></div>`;

  bonesWithFractures.forEach(b => {
    html += `<div style="margin-bottom:14px;">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px;">
        <span>${b.emoji}</span> ${b.name}
      </div>
      ${b.fraturas.map(f => `
        <div class="fracture-item" style="cursor:pointer" onclick="openDetail('${b.id}')">
          <strong>${f.nome}</strong>${f.desc}
        </div>
      `).join('')}
    </div>`;
  });

  main.innerHTML = html;
  lucide.createIcons();
}

function renderPalpacaoView(main) {
  const bonesWithPalpation = BONES.filter(b => b.palpacao && b.palpacao.length > 0);

  let html = `<div class="section-header"><h2>Pontos de Palpação</h2><p>Referência clínica para exame físico e anatomia de superfície</p></div>`;

  bonesWithPalpation.forEach(b => {
    html += `<div style="margin-bottom:16px;">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px;">
        <span>${b.emoji}</span> ${b.name} <span style="font-size:11px;color:var(--muted);font-weight:400;font-style:italic;">${b.latin}</span>
      </div>
      ${b.palpacao.map(p => `
        <div class="palpation-spot" style="cursor:pointer" onclick="openDetail('${b.id}')">
          <div class="spot-name">${p.nome}</div>
          <div class="spot-desc">${p.desc}</div>
        </div>
      `).join('')}
    </div>`;
  });

  main.innerHTML = html;
  lucide.createIcons();
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function filterRegion(region, pill) {
  currentRegion = region;
  closeDetail();

  document.querySelectorAll('.region-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');

  // Sync sidebar
  document.querySelectorAll('.sidebar-item').forEach(item => {
    item.classList.remove('active');
    if (item.getAttribute('onclick') && item.getAttribute('onclick').includes(`'${region}'`)) {
      item.classList.add('active');
    }
  });

  renderMain();
}

function selectSidebarItem(el, region) {
  currentRegion = region;
  closeDetail();

  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');

  // Sync pills
  document.querySelectorAll('.region-pill').forEach(p => {
    p.classList.remove('active');
    if (p.getAttribute('onclick') && p.getAttribute('onclick').includes(`'${region}'`)) {
      p.classList.add('active');
    }
  });

  renderMain();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').style.display = 'none';
  renderMain();
}

// ─── PDF Export ───────────────────────────────────────────────────────────
function exportToPDF() {
  const element = document.createElement('div');
  element.style.padding = '20px';
  element.style.fontFamily = 'Arial, sans-serif';
  element.style.backgroundColor = '#fff';
  element.style.color = '#000';

  let html = `
    <h1 style="text-align:center;color:#0e1117;margin-bottom:5px;">Anatomia Óssea</h1>
    <p style="text-align:center;color:#666;margin-bottom:20px;font-size:14px;">Guia Interativo de Estruturas Ósseas</p>
    <hr style="margin-bottom:20px;"/>
  `;

  BONES.forEach((bone, index) => {
    html += `
      <div style="page-break-inside:avoid;margin-bottom:20px;border-left:4px solid #4f8ef7;padding-left:15px;">
        <h2 style="color:#0e1117;margin:0 0 5px 0;font-size:18px;">${bone.name}</h2>
        <p style="color:#666;margin:0 0 10px 0;font-size:12px;font-style:italic;">${bone.latin}</p>
        
        <p style="color:#333;margin:0 0 10px 0;line-height:1.5;"><strong>Descrição:</strong> ${bone.desc}</p>
        
        <p style="color:#333;margin:0 0 10px 0;line-height:1.5;"><strong>Função:</strong> ${bone.funcao}</p>
        
        <p style="color:#333;margin:0 0 5px 0;"><strong>Acidentes ósseos:</strong> ${bone.acidentes.join(', ')}</p>
        
        ${bone.ossos_relacionados.length > 0 ? `<p style="color:#333;margin:0 0 5px 0;"><strong>Articulações:</strong> ${bone.ossos_relacionados.join(', ')}</p>` : ''}
        
        ${bone.palpacao && bone.palpacao.length > 0 ? `
          <p style="color:#333;margin:0 0 5px 0;"><strong>Pontos de Palpação:</strong></p>
          <ul style="margin:5px 0 10px 20px;padding:0;">
            ${bone.palpacao.map(p => `<li style="margin:3px 0;"><strong>${p.nome}:</strong> ${p.desc}</li>`).join('')}
          </ul>
        ` : ''}
        
        ${bone.clinica ? `<p style="color:#333;margin:0 0 10px 0;line-height:1.5;"><strong>Relevância Clínica:</strong> ${bone.clinica}</p>` : ''}
        
        ${bone.fraturas && bone.fraturas.length > 0 ? `
          <p style="color:#333;margin:0 0 5px 0;"><strong>Fraturas Comuns:</strong></p>
          <ul style="margin:5px 0 10px 20px;padding:0;">
            ${bone.fraturas.map(f => `<li style="margin:3px 0;"><strong>${f.nome}:</strong> ${f.desc}</li>`).join('')}
          </ul>
        ` : ''}
        
        <p style="color:#666;margin:0;font-size:12px;"><strong>Quantidade:</strong> ${bone.count} osso${bone.count !== 1 ? 's' : ''}</p>
      </div>
    `;

    if ((index + 1) % 3 === 0) {
      html += '<div style="page-break-after:always;"></div>';
    }
  });

  element.innerHTML = html;

  const opt = {
    margin: 10,
    filename: 'Anatomia-Ossea-Completo.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
  };

  html2pdf().set(opt).from(element).save();
}
