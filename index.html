<!doctype html>
<html lang="pt-br" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#004a8d">
  <meta name="description" content="Aplicativo interativo de Anatomia Humana 3D - Sistema Esquelético - Universidade Estadual de Maringá">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UEM Anatomia">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23004a8d' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='%23d4a574' text-anchor='middle' dy='.3em'>UEM</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23004a8d' width='180' height='180' rx='40'/><text x='50%' y='50%' font-size='90' fill='%23d4a574' text-anchor='middle' dy='.3em'>UEM</text></svg>">
  <link rel="manifest" href="manifest.json">
  <title>UEM - Anatomia Humana 3D</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
        :root {
            --uem-blue: #004a8d;
            --uem-blue-light: #0066cc;
            --uem-gold: #d4a574;
            --uem-gold-dim: rgba(212,165,116,0.25);
            --dark-bg: #0f0f14;
            --card-bg: #1c1c26;
            --card-border: rgba(212,165,116,0.2);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Sora', 'Segoe UI', sans-serif;
            background: var(--dark-bg);
            color: white;
            overflow-x: hidden;
        }

        .app-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ── NAV DOCK ── */
        .nav-dock {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 68px;
            background: rgba(10,10,20,0.97);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1.5px solid var(--uem-gold);
            z-index: 1000;
            flex-shrink: 0;
        }
        .nav-item {
            color: #888;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.62rem;
            font-weight: 600;
            gap: 3px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 10px;
            transition: color 0.2s;
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-item.active { color: var(--uem-gold); }
        .nav-item svg { width: 20px; height: 20px; }

        /* ── SCENES ── */
        .scene {
            display: none;
            width: 100%;
            height: 100%;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            animation: fadeIn 0.25s ease;
        }
        .scene.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* ── HEADER ── */
        .app-header {
            background: linear-gradient(135deg, #001d40 0%, #004a8d 60%, #00367a 100%);
            padding: 22px 20px 18px;
            text-align: center;
            border-bottom: 2px solid var(--uem-gold);
            position: sticky; top: 0; z-index: 100;
            flex-shrink: 0;
        }
        .app-header .badge {
            display: inline-block;
            background: rgba(212,165,116,0.15);
            border: 1px solid var(--uem-gold);
            color: var(--uem-gold);
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            padding: 2px 10px;
            border-radius: 20px;
            margin-bottom: 6px;
        }
        .app-header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            margin: 0;
        }
        .app-header p {
            font-size: 0.72rem;
            color: #aac4e8;
            margin: 3px 0 0;
        }

        /* ── ANATOMY CARD ── */
        .anatomy-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 0;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
            position: relative;
            margin: 20px 16px 0;
        }
        .anatomy-card:last-child { margin-bottom: 20px; }
        .anatomy-card:hover { transform: translateY(-3px); border-color: var(--uem-gold); box-shadow: 0 8px 30px rgba(212,165,116,0.18); }
        .anatomy-card .card-header-band {
            height: 5px;
        }
        .anatomy-card .card-body { padding: 14px 12px 12px; }
        .anatomy-card .card-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }
        .anatomy-card .card-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 4px; line-height: 1.2; }
        .anatomy-card .card-count { font-size: 0.68rem; color: #888; font-weight: 500; }

        /* ── DETAIL SCENE ── */
        .back-btn {
            display: inline-flex; align-items: center; gap: 7px;
            color: var(--uem-gold); font-size: 0.85rem; font-weight: 600;
            background: rgba(212,165,116,0.1); border: 1px solid var(--uem-gold-dim);
            border-radius: 10px; padding: 7px 13px; margin-bottom: 18px;
            cursor: pointer; transition: background 0.15s;
        }
        .back-btn:hover { background: rgba(212,165,116,0.18); }
        .back-btn svg { width: 16px; height: 16px; }

        .section-tag {
            display: inline-block;
            background: var(--uem-gold);
            color: #111;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 2px 9px;
            border-radius: 20px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .detail-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .detail-desc {
            font-size: 0.82rem;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        /* 3D Viewer placeholder */
        .viewer-box {
            background: linear-gradient(135deg, #0a1929 0%, #001d40 100%);
            border: 1px solid rgba(0,102,204,0.4);
            border-radius: 16px;
            height: 210px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .viewer-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 50%, rgba(0,102,204,0.12) 0%, transparent 70%);
        }
        .viewer-box .viewer-emoji { font-size: 4rem; filter: drop-shadow(0 0 20px rgba(0,102,204,0.6)); }
        .viewer-box .viewer-label { font-size: 0.75rem; color: #6b9fd4; font-weight: 600; letter-spacing: 0.08em; }

        /* Bone items */
        /* ── BONE TABS ── */
        .bones-tabs-sidebar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 8px;
            background: rgba(0,0,0,0.3);
            border-right: 1.5px solid rgba(212,165,116,0.2);
            overflow-y: auto;
            flex-shrink: 0;
            width: 120px;
            max-height: 100%;
            scroll-behavior: smooth;
        }
        .bones-tabs-sidebar::-webkit-scrollbar { width: 4px; }
        .bones-tabs-sidebar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 2px; }
        .bones-tabs-sidebar::-webkit-scrollbar-thumb { background: var(--uem-gold); border-radius: 2px; }
        .bone-tab {
            padding: 10px 8px;
            border: 1px solid rgba(212,165,116,0.3);
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            color: #888;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            white-space: normal;
            word-wrap: break-word;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            flex-shrink: 0;
            text-align: center;
            line-height: 1.3;
        }
        .bone-tab:hover { border-color: var(--uem-gold); background: rgba(212,165,116,0.1); }
        .bone-tab.active { 
            background: var(--uem-gold);
            color: #111;
            border-color: var(--uem-gold);
        }

        .bone-detail-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            min-width: 0;
        }

        /* ── BONE DETAIL IMMERSIVE ── */
        .bone-detail-hero {
            background: linear-gradient(135deg, rgba(0,74,141,0.2) 0%, rgba(212,165,116,0.1) 100%);
            border-bottom: 1px solid rgba(212,165,116,0.2);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
            flex-shrink: 0;
        }
        .bone-hero-emoji { font-size: 3.5rem; filter: drop-shadow(0 0 15px rgba(212,165,116,0.4)); }
        .bone-hero-title { font-size: 1.3rem; font-weight: 800; margin: 0; }
        .bone-hero-subtitle { font-size: 0.8rem; color: #aaa; margin: 0; line-height: 1.4; }
        .hero-section-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── MEDIA BUTTONS ── */
        .media-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
            flex-shrink: 0;
        }
        .media-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(212,165,116,0.15);
            border: 1.5px solid var(--uem-gold);
            color: var(--uem-gold);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .media-btn:hover {
            background: rgba(212,165,116,0.25);
            transform: translateY(-2px);
        }
        .media-btn svg { width: 18px; height: 18px; }

        /* ── MEDIA PREVIEW ── */
        .media-preview {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }
        .media-item {
            position: relative;
            border: 1px solid rgba(212,165,116,0.2);
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 1;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .media-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .media-item .remove-media {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 24px;
            height: 24px;
            background: rgba(231,76,60,0.9);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: background 0.2s;
        }
        .media-item .remove-media:hover {
            background: rgba(231,76,60,1);
        }

        .bone-detail-content {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .notes-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(212,165,116,0.2);
        }

        .notes-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--uem-gold);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .notes-textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212,165,116,0.2);
            border-radius: 10px;
            color: #ddd;
            padding: 12px 14px;
            font-size: 0.85rem;
            font-family: 'Sora', Segoe UI, sans-serif;
            resize: vertical;
            min-height: 100px;
            max-height: 150px;
            transition: border-color 0.2s;
        }

        .notes-textarea:focus {
            outline: none;
            border-color: var(--uem-gold);
            background: rgba(212,165,116,0.05);
        }

        .notes-textarea::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .notes-char-count {
            font-size: 0.65rem;
            color: #888;
            margin-top: 6px;
            text-align: right;
        }
        .bone-detail-section {
            margin-bottom: 20px;
        }
        .bone-detail-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--uem-gold);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .bone-detail-text {
            font-size: 0.85rem;
            color: #ddd;
            line-height: 1.8;
            background: rgba(255,255,255,0.03);
            padding: 12px 14px;
            border-radius: 10px;
            border-left: 3px solid var(--uem-gold);
        }

        /* ── ANATOMICAL LANDMARKS CHECKLIST ── */
        .landmarks-checklist {
            background: rgba(212,165,116,0.08);
            border: 1px solid rgba(212,165,116,0.25);
            border-radius: 12px;
            padding: 14px;
            margin-top: 16px;
        }
        .landmarks-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--uem-gold);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .landmark-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.78rem;
            color: #ddd;
            line-height: 1.5;
        }
        .landmark-checkbox {
            width: 18px;
            height: 18px;
            min-width: 18px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--uem-gold);
        }
        .landmark-text {
            flex: 1;
        }

        /* ── GUIDE SCENE ── */
        .guide-step {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px 16px 16px 18px;
            margin-bottom: 14px;
            position: relative;
        }
        .guide-step-number {
            position: absolute;
            top: -10px; left: 14px;
            background: var(--uem-gold);
            color: #111;
            font-size: 0.68rem;
            font-weight: 800;
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .guide-step-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; }
        .guide-step-body { font-size: 0.78rem; color: #aaa; line-height: 1.6; }
        .guide-step-body ul { padding-left: 16px; margin: 6px 0 0; }
        .guide-step-body li { margin-bottom: 4px; }

        /* ── CASES SCENE ── */
        .case-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
        }
        .case-card .case-tag {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 2px 9px;
            border-radius: 20px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .tag-trauma { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid rgba(231,76,60,0.35); }
        .tag-ortho  { background: rgba(52,152,219,0.2); color: #3498db; border: 1px solid rgba(52,152,219,0.35); }
        .tag-neuro  { background: rgba(155,89,182,0.2); color: #9b59b6; border: 1px solid rgba(155,89,182,0.35); }
        .case-card .case-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; }
        .case-card .case-desc  { font-size: 0.78rem; color: #aaa; line-height: 1.6; margin-bottom: 12px; }

        .accordion-btn {
            width: 100%;
            background: rgba(0,74,141,0.25);
            border: 1px solid rgba(0,102,204,0.3);
            border-radius: 9px;
            color: #7bb3e0;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 9px 14px;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.15s;
        }
        .accordion-btn:hover { background: rgba(0,74,141,0.4); }
        .accordion-btn svg { width: 16px; height: 16px; transition: transform 0.2s; flex-shrink: 0; }
        .accordion-btn.open svg { transform: rotate(180deg); }
        .accordion-content {
            display: none;
            background: rgba(0,74,141,0.1);
            border: 1px solid rgba(0,102,204,0.2);
            border-top: none;
            border-radius: 0 0 9px 9px;
            padding: 12px 14px;
            font-size: 0.77rem;
            color: #b0c8e0;
            line-height: 1.65;
        }
        .accordion-content.open { display: block; }
        .accordion-content.locked {
            display: block !important;
            background: rgba(200,50,50,0.15);
            border: 1px solid rgba(231,76,60,0.4);
            color: #e74c3c;
            text-align: center;
            padding: 16px;
        }
        .accordion-content.locked .lock-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .accordion-content.locked .lock-text {
            font-size: 0.75rem;
            margin-bottom: 10px;
        }
        .password-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(212,165,116,0.4);
            background: rgba(212,165,116,0.1);
            color: white;
            border-radius: 6px;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }
        .password-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .password-btn {
            width: 100%;
            padding: 8px 12px;
            background: var(--uem-gold);
            color: #111;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .password-btn:hover {
            background: #e8b86a;
        }

        /* ── PDF FLOAT ── */
        .floating-pdf {
            position: fixed;
            bottom: 84px; right: 16px;
            background: linear-gradient(135deg, #1a7a45, #27ae60);
            width: 52px; height: 52px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 18px rgba(39,174,96,0.45);
            z-index: 999;
            border: none; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .floating-pdf:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(39,174,96,0.6); }
        .floating-pdf svg { width: 22px; height: 22px; color: white; }

        /* ── INSTALL FLOAT ── */
        .floating-install {
            position: fixed;
            bottom: 84px; right: 76px;
            background: linear-gradient(135deg, #0066cc, #004a8d);
            width: 52px; height: 52px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 18px rgba(0,102,204,0.45);
            z-index: 999;
            border: none; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            animation: bounce 2s infinite;
        }
        .floating-install:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(0,102,204,0.6); }
        .floating-install svg { width: 22px; height: 22px; color: white; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ── LOADING ── */
        #loading {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 14px;
        }
        #loading.visible { display: flex; }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: var(--uem-gold);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── SECTION TITLES ── */
        .section-head {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--uem-gold);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--uem-gold-dim);
        }

        /* Color accents per system */
        .c-skeletal  { color: #f39c12; }
        .c-muscular  { color: #e74c3c; }
        .c-neuro     { color: #9b59b6; }
        .c-vascular  { color: #e74c3c; }
        .c-digestive { color: #27ae60; }
        .c-respiratory { color: #3498db; }

        .bg-skeletal   { background: rgba(243,156,18,0.15); }
        .bg-muscular   { background: rgba(231,76,60,0.15); }

function renderCards() {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';
    systems.forEach(sys => {
        const card = document.createElement('div');
        card.className = 'anatomy-card';
        card.innerHTML = `
            <div class="card-header-band ${sys.bandClass}"></div>
            <div class="card-body">
                <div class="card-icon ${sys.bgClass}">
                    <span>${sys.emoji}</span>
                </div>
                <div class="card-title">${sys.name}</div>
                <div class="card-count">${sys.structures.length} estruturas</div>
            </div>
        `;
        card.addEventListener('click', () => showDetail(sys.id, 0));
        grid.appendChild(card);
    });
}

function showDetail(sysId, boneIndex = 0) {
    const sys = systems.find(s => s.id === sysId);
    if (!sys || !sys.structures[boneIndex]) return;

    // Render tabs
    const tabsContainer = document.getElementById('bones-tabs');
    tabsContainer.innerHTML = '';
    sys.structures.forEach((bone, idx) => {
        const tab = document.createElement('button');
        tab.className = `bone-tab ${idx === boneIndex ? 'active' : ''}`;
        tab.textContent = bone.title.split(' — ')[0];
        tab.addEventListener('click', () => showDetail(sysId, idx));
        tabsContainer.appendChild(tab);
    });

    // Update hero
    const bone = sys.structures[boneIndex];
    const heroContainer = document.getElementById('bone-hero');
    heroContainer.innerHTML = `
        <div class="hero-section-wrapper">
            <div class="bone-hero-emoji">${sys.emoji}</div>
            <h2 class="bone-hero-title">${bone.title}</h2>
            <div class="media-buttons">
                <button class="media-btn" onclick="triggerFileUpload(${boneIndex})">
                    <i data-lucide="image-plus"></i> Inserir Arquivo
                </button>
                <button class="media-btn" onclick="triggerCamera(${boneIndex})">
                    <i data-lucide="camera"></i> Tirar Foto
                </button>

function toggleAccordion(i) {

function triggerFileUpload(boneIndex) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                addMedia(boneIndex, event.target.result, 'file');
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}

async function triggerCamera(boneIndex) {
    try {
        // Try multiple constraint combinations for better compatibility
        let stream = null;
        const constraints = [
            { video: { facingMode: 'environment' } },
            { video: true },
            { video: { width: { ideal: 1280 }, height: { ideal: 720 } } }
        ];
        
        for (let constraint of constraints) {
            try {
                stream = await navigator.mediaDevices.getUserMedia(constraint);
                break;
            } catch (e) {
                continue;
            }
        }
        
        if (!stream) {
            showToast('Câmera não disponível neste dispositivo');
            return;
        }
        
        // Create modal overlay
        const modal = document.createElement('div');
        modal.style.cssText = `
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2001;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        `;
        
        const video = document.createElement('video');
        video.setAttribute('playsinline', true);
        video.setAttribute('autoplay', true);
        video.setAttribute('muted', true);
        video.style.cssText = `
            width: 100%;
            max-width: 400px;
            max-height: 500px;
            border-radius: 16px;
            background: #000;
            object-fit: cover;
            transform: scaleX(-1);
        `;
        video.srcObject = stream;
        
        const canvas = document.createElement('canvas');
        const btnContainer = document.createElement('div');
        btnContainer.style.cssText = `
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        `;
        
        const captureBtn = document.createElement('button');
        captureBtn.textContent = '📸 Capturar';
        captureBtn.style.cssText = `
            background: var(--uem-gold);
            color: #111;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.2s;
        `;
        captureBtn.onmouseover = () => captureBtn.style.transform = 'scale(1.05)';
        captureBtn.onmouseout = () => captureBtn.style.transform = 'scale(1)';
        
        const closeBtn = document.createElement('button');
        closeBtn.textContent = '✕ Fechar';
        closeBtn.style.cssText = `
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        `;
        closeBtn.onmouseover = () => closeBtn.style.background = 'rgba(255,255,255,0.2)';
        closeBtn.onmouseout = () => closeBtn.style.background = 'rgba(255,255,255,0.1)';
        
        const stopStream = () => {
            stream.getTracks().forEach(track => {
                track.stop();
            });
        };
        
        captureBtn.onclick = () => {
            // Wait for video to load dimensions
            if (video.videoWidth === 0 || video.videoHeight === 0) {
                showToast('Aguarde a câmera carregar');
                return;
            }
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.scale(-1, 1); // Mirror horizontally
            ctx.drawImage(video, -canvas.width, 0);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            
            stopStream();
            if (modal.parentNode) {
                document.body.removeChild(modal);
            }
            
            addMedia(boneIndex, dataUrl, 'camera');
            showToast('Foto capturada com sucesso');
        };
        
        closeBtn.onclick = () => {
            stopStream();
            if (modal.parentNode) {
                document.body.removeChild(modal);
            }
        };
        
        // Stop stream on page change
        window.addEventListener('beforeunload', stopStream);
        
        btnContainer.appendChild(captureBtn);
        btnContainer.appendChild(closeBtn);
        
        modal.appendChild(video);
        modal.appendChild(btnContainer);
        document.body.appendChild(modal);
        
        // Ensure video plays
        video.play().catch(e => {
            showToast('Erro ao iniciar câmera');
            stopStream();
            document.body.removeChild(modal);
        });
        
    } catch (err) {
        console.error('Camera error:', err.name, err.message);
        showToast('Câmera não disponível — use upload de arquivo');
    }
}

function addMedia(boneIndex, src, type) {
    if (!mediaStore[boneIndex]) {
        mediaStore[boneIndex] = [];
    }
    
    mediaStore[boneIndex].push({
        type,
        src,
        timestamp: new Date().toLocaleTimeString()
    });
    
    renderMediaPreview(boneIndex);
}

function renderMediaPreview(boneIndex) {
    const preview = document.getElementById(`media-preview-${boneIndex}`);
    if (!preview) return;
    
    preview.innerHTML = '';
    
    if (mediaStore[boneIndex] && mediaStore[boneIndex].length > 0) {
        mediaStore[boneIndex].forEach((media, idx) => {
            const item = document.createElement('div');
            item.className = 'media-item';
            item.innerHTML = `
                <img src="${media.src}" alt="Media ${idx + 1}" />
                <button class="remove-media" onclick="removeMedia(${boneIndex}, ${idx})" title="Remover">✕</button>
            `;
            preview.appendChild(item);
        });
    }
}

function removeMedia(boneIndex, idx) {
    if (mediaStore[boneIndex]) {
        mediaStore[boneIndex].splice(idx, 1);
        renderMediaPreview(boneIndex);
        showToast('Mídia removida');
    }
}

function switchScene(name) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

    const scene = document.getElementById(`scene-${name}`);
    if (scene) scene.classList.add('active');

    const navId = name === 'detail' ? 'nav-cards' : `nav-${name}`;
    const navEl = document.getElementById(navId);
    if (navEl) navEl.classList.add('active');

    // Scroll bones tabs to active tab
    if (name === 'detail') {
        setTimeout(() => {
            const activeTab = document.querySelector('.bone-tab.active');
            if (activeTab && activeTab.parentElement) {
                activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }, 50);
    }
}
